<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: #2b2b2b;
      color: #ccc;
      font-family: system-ui, sans-serif;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #1e1e1e;
      border-bottom: 1px solid #444;
      height: 40px;
      flex-shrink: 0;
    }

    #toolbar button {
      background: #3a3a3a;
      border: 1px solid #555;
      color: #ccc;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #toolbar button:hover {
      background: #4a4a4a;
    }

    #toolbar button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #page-info {
      font-size: 13px;
      color: #aaa;
    }

    #page-input {
      width: 46px;
      text-align: center;
      background: #3a3a3a;
      border: 1px solid #555;
      color: #ccc;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
    }

    #zoom-select {
      background: #3a3a3a;
      border: 1px solid #555;
      color: #ccc;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
    }

    #canvas-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      gap: 12px;
    }

    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    canvas {
      display: block;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      background: white;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #ccc;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    body {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <button id="btn-prev">&#8592;</button>
    <input id="page-input" type="number" min="1" value="1" />
    <span id="page-info">/ 0</span>
    <button id="btn-next">&#8594;</button>
    <select id="zoom-select">
      <option value="0.5">50%</option>
      <option value="0.75">75%</option>
      <option value="1" selected>100%</option>
      <option value="1.25">125%</option>
      <option value="1.5">150%</option>
      <option value="2">200%</option>
    </select>
  </div>
  <div id="canvas-wrap">
    <div id="container"></div>
  </div>
  <div id="status">Loading PDF...</div>

  <script>
    // Polyfill Promise.withResolvers (required by PDF.js v5, not yet in all Chromium/Electron builds)
    if (typeof Promise.withResolvers === 'undefined') {
      Promise.withResolvers = function () {
        let resolve, reject;
        const promise = new Promise((res, rej) => { resolve = res; reject = rej; });
        return { promise, resolve, reject };
      };
    }
    // Polyfill Map.prototype.getOrInsertComputed (required by PDF.js v5, not yet in all Chromium builds)
    if (!Map.prototype.getOrInsertComputed) {
      Map.prototype.getOrInsertComputed = function (key, computeFn) {
        if (!this.has(key)) this.set(key, computeFn(key));
        return this.get(key);
      };
    }
    // Polyfill URL.parse (required by PDF.js v5, added in Chrome 126)
    if (typeof URL.parse === 'undefined') {
      URL.parse = function (url, base) {
        try {
          return new URL(url, base);
        } catch (e) {
          return null;
        }
      };
    }
    // Polyfill Promise.try (required by PDF.js v5, added in Chrome 130)
    if (typeof Promise.try === 'undefined') {
      Promise.try = function (fn, ...args) {
        return new Promise((resolve, reject) => {
          try { resolve(fn(...args)); } catch (e) { reject(e); }
        });
      };
    }
    // Polyfills for Uint8Array hex/base64 methods (required by PDF.js v5, added in Chrome 130)
    if (typeof Uint8Array.prototype.toHex === 'undefined') {
      Uint8Array.prototype.toHex = function () {
        let out = '';
        for (let i = 0; i < this.length; i++) out += this[i].toString(16).padStart(2, '0');
        return out;
      };
    }
    if (typeof Uint8Array.prototype.toBase64 === 'undefined') {
      Uint8Array.prototype.toBase64 = function () {
        let str = '';
        for (let i = 0; i < this.length; i++) str += String.fromCharCode(this[i]);
        return btoa(str);
      };
    }
    if (typeof Uint8Array.fromBase64 === 'undefined') {
      Uint8Array.fromBase64 = function (str) {
        const bin = atob(str.replace(/\s/g, ''));
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
        return out;
      };
    }
  </script>

  <script type="module">
    import * as pdfjsLib from '/pdfjs/build/pdf.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = '/pdfjs/build/pdf.worker.mjs';

    const params = new URLSearchParams(window.location.search);
    const fileUrl = params.get('file') || '';

    const status = document.getElementById('status');
    const container = document.getElementById('container');
    const pageInfo = document.getElementById('page-info');
    const pageInput = document.getElementById('page-input');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const zoomSelect = document.getElementById('zoom-select');

    let pdfDoc = null;
    let currentPage = 1;
    let scale = 1;
    let rendering = false;

    function showStatus(msg) { status.textContent = msg; status.style.display = 'block'; }
    function hideStatus() { status.style.display = 'none'; }

    async function renderPage(num) {
      if (!pdfDoc || rendering) return;
      rendering = true;
      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale });
      let canvas = document.getElementById('page-canvas-' + num);
      if (!canvas) {
        canvas = document.createElement('canvas');
        canvas.id = 'page-canvas-' + num;
        container.appendChild(canvas);
      }
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      rendering = false;
    }

    async function renderAll() {
      container.innerHTML = '';
      showStatus('Rendering...');
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.id = 'page-canvas-' + i;
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        container.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
      }
      document.querySelectorAll('[id^="page-canvas-"]').forEach(c => observer.observe(c));
      hideStatus();
    }

    function scrollToPage(num) {
      const canvas = document.getElementById('page-canvas-' + num);
      if (canvas) canvas.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function updateUI() {
      pageInfo.textContent = '/ ' + (pdfDoc ? pdfDoc.numPages : 0);
      pageInput.value = currentPage;
      btnPrev.disabled = currentPage <= 1;
      btnNext.disabled = !pdfDoc || currentPage >= pdfDoc.numPages;
    }

    async function loadPdf(url) {
      if (!url) { showStatus('No PDF file specified.'); return; }
      showStatus('Loading PDF...');
      try {
        const loadingTask = pdfjsLib.getDocument({ url });
        pdfDoc = await loadingTask.promise;
        pageInput.max = pdfDoc.numPages;
        updateUI();
        await renderAll();
        scrollToPage(1);
      } catch (e) {
        showStatus('Error loading PDF: ' + e.message);
        console.error('PDF load error:', e);
      }
    }

    btnPrev.addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; updateUI(); scrollToPage(currentPage); }
    });
    btnNext.addEventListener('click', () => {
      if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; updateUI(); scrollToPage(currentPage); }
    });
    pageInput.addEventListener('change', () => {
      const n = parseInt(pageInput.value);
      if (pdfDoc && n >= 1 && n <= pdfDoc.numPages) { currentPage = n; updateUI(); scrollToPage(currentPage); }
    });
    zoomSelect.addEventListener('change', async () => {
      scale = parseFloat(zoomSelect.value);
      if (pdfDoc) await renderAll();
    });

    // Track current page via scroll intersection
    const observer = new IntersectionObserver((entries) => {
      for (const e of entries) {
        if (e.isIntersecting) {
          const num = parseInt(e.target.id.replace('page-canvas-', ''));
          if (!isNaN(num)) { currentPage = num; pageInput.value = num; }
        }
      }
    }, { threshold: 0.5 });

    loadPdf(fileUrl);
  </script>
</body>

</html>
